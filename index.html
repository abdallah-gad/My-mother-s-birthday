<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>🎂 عيد ميلاد سعيد يا أمي ❤️</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(145deg, #fce4ec 0%, #ffe0e7 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-x: hidden;
        position: relative;
    }

    /* شاشة القفل */
    #lockScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #f8bbd0, #fce4ec);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 1000;
        backdrop-filter: blur(5px);
        transition: all 0.5s ease;
    }

    .lock-card {
        background: rgba(255, 245, 240, 0.9);
        backdrop-filter: blur(15px);
        padding: 2rem;
        border-radius: 48px;
        text-align: center;
        width: 85%;
        max-width: 340px;
        box-shadow: 0 25px 45px rgba(0,0,0,0.1);
        border: 1px solid rgba(255,255,255,0.6);
    }

    .lock-card h2 {
        color: #b34180;
        margin-bottom: 1.5rem;
        font-size: 1.8rem;
    }

    .lock-card input {
        width: 100%;
        padding: 14px 20px;
        font-size: 1.1rem;
        border: none;
        border-radius: 60px;
        text-align: center;
        background: white;
        margin-bottom: 1rem;
        font-family: inherit;
        border: 1px solid #f3a5be;
    }

    .lock-card button {
        background: #e91e63;
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 60px;
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        width: 100%;
        font-family: inherit;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .lock-card button:active {
        transform: scale(0.97);
        background: #c2185b;
    }

    /* المحتوى الرئيسي */
    #main {
        display: none;
        width: 100%;
        max-width: 550px;
        margin: 20px auto;
        padding: 20px 16px 40px;
        text-align: center;
        position: relative;
        z-index: 10;
    }

    .header {
        margin-bottom: 15px;
        animation: fadeInDown 0.8s ease;
    }

    .heart {
        font-size: 2.8rem;
        animation: pulse 1.8s infinite;
        display: inline-block;
        color: #d81b60;
        text-shadow: 0 0 5px #ffb6c1;
        margin-bottom: 5px;
    }

    h1 {
        font-size: 1.8rem;
        margin: 8px 0 20px 0;
        background: linear-gradient(135deg, #c2185b, #ec407a);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        text-shadow: none;
    }

    /* السلايدر */
    .slider-container {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        max-width: 340px;
        margin: 30px auto 20px auto;
        border-radius: 32px;
        overflow: hidden;
        box-shadow: 0 20px 35px rgba(0,0,0,0.15);
        background: #fce4ec;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .slider {
        position: relative;
        width: 100%;
        height: 100%;
    }

    .slide {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        border-radius: 32px;
        opacity: 0;
        transition: opacity 0.6s ease-in-out;
        background: #fff0f3;
    }

    .slide.active {
        opacity: 1;
        z-index: 2;
    }

    .dots {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 12px;
    }

    .dot {
        width: 10px;
        height: 10px;
        background: #f8a5c2;
        border-radius: 50%;
        cursor: pointer;
        transition: 0.2s;
    }

    .dot.active-dot {
        background: #e91e63;
        width: 24px;
        border-radius: 20px;
    }

    /* العمر والرسائل */
    .info-card {
        background: rgba(255, 240, 245, 0.85);
        backdrop-filter: blur(8px);
        border-radius: 36px;
        padding: 16px 20px;
        margin: 20px 0;
        border: 1px solid rgba(255, 192, 203, 0.6);
        box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    /* كروت الرسائل المنفصلة */
    .message-card {
        background: rgba(255, 248, 250, 0.95);
        backdrop-filter: blur(8px);
        border-radius: 28px;
        padding: 18px 20px;
        margin: 16px 0;
        border-right: 8px solid #e91e63;
        border-left: 1px solid rgba(255, 192, 203, 0.4);
        text-align: right;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        transition: transform 0.2s ease;
    }

    .message-card:hover {
        transform: translateX(-5px);
    }

    .message-sender {
        font-size: 1.2rem;
        font-weight: bold;
        color: #c2185b;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .message-sender span {
        font-size: 1.5rem;
    }

    .message-text {
        font-size: 1rem;
        line-height: 1.7;
        color: #4a2c3a;
        font-weight: 500;
    }

    #age {
        font-size: 1.2rem;
        color: #a53860;
        margin-bottom: 12px;
        font-weight: bold;
        text-align: center;
    }

    #myMessage {
        font-size: 1rem;
        line-height: 1.7;
        color: #4a2c3a;
        text-align: center;
        font-weight: 500;
    }

    .footer-note {
        font-size: 0.85rem;
        color: #c94f7c;
        margin-top: 20px;
        opacity: 0.8;
        font-weight: 500;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.9; text-shadow: 0 0 0px #ff99aa;}
        50% { transform: scale(1.15); opacity: 1; text-shadow: 0 0 15px #ffb7c5;}
        100% { transform: scale(1); opacity: 0.9;}
    }

    @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
    }

    @media (max-width: 500px) {
        #main {
            padding: 12px 12px 30px;
        }
        h1 {
            font-size: 1.4rem;
        }
        .heart {
            font-size: 2.2rem;
        }
        .info-card {
            padding: 12px 16px;
        }
        .message-card {
            padding: 14px 16px;
        }
        .message-sender {
            font-size: 1rem;
        }
        .message-text {
            font-size: 0.9rem;
        }
    }
</style>
</head>
<body>

<div id="lockScreen">
    <div class="lock-card">
        <h2>🌸 باسم من؟ 🌸</h2>
        <input type="text" id="password" placeholder="أدخل الاسم ..." autocomplete="off">
        <button onclick="checkPassword()">✨ افتحي المفاجأة ✨</button>
        <p style="color:#b34180; margin-top: 20px; font-size:14px;">💖 أكيد عيد ميلاد أغلى حاجة في قلبك 💖</p>
    </div>
</div>

<div id="main">
    <div class="header">
        <div class="heart">🌷🤍 أمنا الحنونة 🤍🌷</div>
        <h1>🎉 كل سنة وأنتي طيبة يا قمر 🎉</h1>
    </div>

    <div class="slider-container">
        <div class="slider" id="imageSlider">
            <img src="1.jpg" class="slide active" alt="صورة 1">
            <img src="2.jpg" class="slide" alt="صورة 2">
            <img src="3.jpg" class="slide" alt="صورة 3">
            <img src="4.jpg" class="slide" alt="صورة 4">
            <img src="5.jpg" class="slide" alt="صورة 5">
            <img src="6.jpg" class="slide" alt="صورة 6">
            <img src="7.jpg" class="slide" alt="صورة 7">
            <img src="8.jpg" class="slide" alt="صورة 8">
        </div>
        <div class="dots" id="dotsContainer"></div>
    </div>

    <div class="info-card">
        <p id="age"></p>
    </div>

    <!-- رسالة عبد الله -->
    <div class="message-card">
        <div class="message-sender">
            <span>🤍</span> عبد الله (فرحتك)
        </div>
        <div class="message-text" id="myMessage"></div>
    </div>

    <!-- رسالة أبويا -->
    <div class="message-card">
        <div class="message-sender">
            <span>👨‍💼</span> محمد (حبيبك)
        </div>
        <div class="message-text" id="fatherMessage"></div>
    </div>

    <!-- رسالة أختي -->
    <div class="message-card">
        <div class="message-sender">
            <span>👧</span> رحمه (روحك)
        </div>
        <div class="message-text" id="sisterMessage"></div>
    </div>

    <!-- رسالة أخوي -->
    <div class="message-card">
        <div class="message-sender">
            <span>👦</span> ضياء (قلبك)
        </div>
        <div class="message-text" id="brotherMessage"></div>
    </div>

    <div class="footer-note">
        🤍 أنتِ نبض البيت وفرحته 🤍
    </div>
</div>

<canvas id="fireworksCanvas"></canvas>

<script>
    // 🔐 كلمة السر
    const correctPassword = "هانم";

    function checkPassword() {
        let input = document.getElementById("password").value.trim();
        if (input === correctPassword) {
            document.getElementById("lockScreen").style.display = "none";
            document.getElementById("main").style.display = "block";
            calculateAge();
            startFireworks();
            displayAllMessages();
            initSlider();
            playBackgroundMusic();
        } else {
            alert("❌ للأسف مش صح 😅 جربي تاني");
        }
    }

    // حساب العمر
    function calculateAge() {
        let birthDate = new Date("1983-04-16");
        let today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        let monthDiff = today.getMonth() - birthDate.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }
        document.getElementById("age").innerHTML = `🎂 العمر: ${age} سنة 🎂<br>📅 ١٦ أبريل ١٩٨٣`;
    }

    // كل الرسائل (هتظهر مرة واحدة من غير كتابة بطيئة عشان تكون واضحة)
    function displayAllMessages() {
        // رسالة عبد الله
        const myMsg = `كل سنة وانتي طيبة يا أمي الحبيبة 🤍
مهما أقول مش هقدر أوفي حقك. ربنا يخليكي ليا ويفضل ضهرك سندي، انتِ نعمة كبيرة في حياتي. بحبك جدًا 🤍🎂✨`;
        document.getElementById("myMessage").innerHTML = myMsg;

        // رسالة الأب (أبويا)
        const fatherMsg = `حبيبتي زوجتي الغالية 🤍
كل سنة وانتي طيبة يا أغلى الناس. ربنا يحميكي ويخليكي لينا، انتِ شريكة العمر وأم أولادي الغاليين. كل سنة وانتي نور البيت 🌹✨`;
        document.getElementById("fatherMessage").innerHTML = fatherMsg;

        // رسالة الأخت
        const sisterMsg = `أمي الحنونة 🤍
أنتي قدوتي في الحياة، كل سنة وانتي طيبة يا أجمل أم. ربنا يفرح قلبك دايماً ويكتب لك الصحة والسعادة. بحبك أوي يا ست الكل 💕🎂`;
        document.getElementById("sisterMessage").innerHTML = sisterMsg;

        // رسالة الأخ
        const brotherMsg = `أمي العزيزة 🤍
كل سنة وانتي طيبة يا أحن أم. ربنا يديك طولة العمر ويخليكي لينا. انتِ السند والأمان، فرحتك هي فرحتنا كلنا 🌸🎉`;
        document.getElementById("brotherMessage").innerHTML = brotherMsg;
    }

    // السلايدر
    let slides = [];
    let dots = [];
    let currentIndex = 0;
    let slideInterval;

    function initSlider() {
        slides = Array.from(document.querySelectorAll(".slide"));
        const dotsContainer = document.getElementById("dotsContainer");
        dotsContainer.innerHTML = "";
        
        slides.forEach((_, idx) => {
            const dot = document.createElement("div");
            dot.classList.add("dot");
            if (idx === 0) dot.classList.add("active-dot");
            dot.addEventListener("click", () => {
                clearInterval(slideInterval);
                goToSlide(idx);
                startAutoSlide();
            });
            dotsContainer.appendChild(dot);
            dots.push(dot);
        });

        startAutoSlide();

        const sliderDiv = document.querySelector(".slider-container");
        let touchStartX = 0;
        sliderDiv.addEventListener("touchstart", (e) => {
            touchStartX = e.changedTouches[0].screenX;
            clearInterval(slideInterval);
        });
        sliderDiv.addEventListener("touchend", (e) => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 40) nextSlide();
            if (touchEndX > touchStartX + 40) prevSlide();
            startAutoSlide();
        });
    }

    function goToSlide(index) {
        slides[currentIndex].classList.remove("active");
        dots[currentIndex].classList.remove("active-dot");
        currentIndex = (index + slides.length) % slides.length;
        slides[currentIndex].classList.add("active");
        dots[currentIndex].classList.add("active-dot");
    }

    function nextSlide() {
        goToSlide(currentIndex + 1);
    }

    function prevSlide() {
        goToSlide(currentIndex - 1);
    }

    function startAutoSlide() {
        if (slideInterval) clearInterval(slideInterval);
        slideInterval = setInterval(() => {
            nextSlide();
        }, 3200);
    }

    // الألعاب النارية
    function startFireworks() {
        const canvas = document.getElementById("fireworksCanvas");
        const ctx = canvas.getContext("2d");
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);

        function createFirework() {
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height * 0.6;
            let pastelColors = ["#FFB7B2", "#FFDAC1", "#E2F0CB", "#B5EAD7", "#C7CEE6", "#F9B5AC", "#FADADD"];
            let color = pastelColors[Math.floor(Math.random() * pastelColors.length)];
            for (let i = 0; i < 35; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4 - 1.2,
                    life: 70 + Math.random() * 40,
                    color: color,
                    size: 2.5 + Math.random() * 3
                });
            }
        }

        function draw() {
            ctx.fillStyle = "rgba(255, 245, 240, 0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 1.5;
                p.vy += 0.08;
                
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(draw);
        }

        setInterval(() => {
            if (document.getElementById("main").style.display === "block") {
                createFirework();
            }
        }, 1200);
        draw();
    }

    // الموسيقى
    let musicPlaying = false;
    function playBackgroundMusic() {
        const audio = new Audio();
        const songsList = [
            "Song1.mp3",
            "Song2.mp3",
            "Song3.mp3",
            "Song4.mp3"
        ];
        let songIndex = 0;
        audio.src = songsList[songIndex];
        audio.loop = false;
        audio.volume = 0.4;
        
        audio.addEventListener("ended", () => {
            songIndex = (songIndex + 1) % songsList.length;
            audio.src = songsList[songIndex];
            audio.play();
        });
        
        document.body.addEventListener("click", function once() {
            if (!musicPlaying) {
                audio.play();
                musicPlaying = true;
            }
        });
        
        audio.play().then(() => musicPlaying = true).catch(() => {});
    }

    window.addEventListener("resize", () => {
        const canvas = document.getElementById("fireworksCanvas");
        if (canvas) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
    });
</script>
</body>
</html>
